<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="100%" stop-color="#00b0ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6d00"/>
      <stop offset="50%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#00b0ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="url(#g)" stroke-width="6" opacity="0.2"/>
  <!-- Main circle arc (balance symbol) -->
  <path d="M 256 85 A 155 155 0 1 1 101 240" fill="none" stroke="url(#g2)" stroke-width="12" stroke-linecap="round"/>
  <!-- Balance beam -->
  <line x1="160" y1="240" x2="352" y2="240" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
  <!-- Center fulcrum -->
  <circle cx="256" cy="240" r="14" fill="url(#g)"/>
  <!-- Left weight -->
  <circle cx="175" cy="240" r="22" fill="none" stroke="#ff6d00" stroke-width="5"/>
  <circle cx="175" cy="240" r="8" fill="#ff6d00"/>
  <!-- Right weight -->
  <circle cx="337" cy="240" r="22" fill="none" stroke="#00b0ff" stroke-width="5"/>
  <circle cx="337" cy="240" r="8" fill="#00b0ff"/>
  <!-- FB text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="88" fill="url(#g)" letter-spacing="8">FB</text>
  <!-- Sparkle dots -->
  <circle cx="256" cy="83" r="6" fill="#ff6d00" opacity="0.9"/>
  <circle cx="380" cy="130" r="4" fill="#ffab40" opacity="0.6"/>
  <circle cx="132" cy="130" r="4" fill="#40c4ff" opacity="0.6"/>
</svg>